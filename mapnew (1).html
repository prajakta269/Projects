    // Wall collision detection
    class Point {
      constructor(x, y) {
        this.x = x;
        this.y = y;
      }
    }

    function getIntersection(p1, q1, p2, q2) {
      let A1 = q1.y - p1.y;
      let B1 = p1.x - q1.x;
      let C1 = A1 * p1.x + B1 * p1.y;
      
      let A2 = q2.y - p2.y;
      let B2 = p2.x - q2.x;
      let C2 = A2 * p2.x + B2 * p2.y;
      
      let determinant = A1 * B2 - A2 * B1;
      
      if (Math.abs(determinant) < 0.001) return null;
      
      let x = (B2 * C1 - B1 * C2) / determinant;
      let y = (A1 * C2 - A2 * C1) / determinant;
      return new Point(x, y);
    }

    function onSegment(p, r, q) {
      return (
        r.x >= Math.min(p.x, q.x) - 0.1 && r.x <= Math.max(p.x, q.x) + 0.1 &&
        r.y >= Math.min(p.y, q.y) - 0.1 && r.y <= Math.max(p.y, q.y) + 0.1
      );
    }

    function doesPathCrossWall(start, end, walls) {
      const pathStart = new Point(start[0], start[1]);
      const pathEnd = new Point(end[0], end[1]);
      
      for (let wall of walls) {
        const wallStart = new Point(wall.start[0], wall.start[1]);
        const wallEnd = new Point(wall.end[0], wall.end[1]);
        
        const intersection = getIntersection(pathStart, pathEnd, wallStart, wallEnd);
        
        if (intersection && onSegment(pathStart, intersection, pathEnd) && 
            onSegment(wallStart, intersection, wallEnd)) {
          return true;
        }
      }
      return false;

    const waypoints = {
      "Waypoint1": [780, 291], "Waypoint2": [703, 288], "Waypoint3": [550, 286],
      "Waypoint5": [400, 285], "Waypoint6": [271, 325], "Waypoint7": [184, 325],

    function getDistance(a, b) {
      return Math.sqrt(Math.pow(a[0] - b[0], 2) + Math.pow(a[1] - b[1], 2));
    }

    // Build navigation graph
    function buildNavigationGraph() {
      const allNodes = { ...rooms, ...waypoints };
      const graph = {};
      
      Object.keys(allNodes).forEach(node => {
        graph[node] = {};
      });

      const nodeEntries = Object.entries(allNodes);
      
      for (let i = 0; i < nodeEntries.length; i++) {
        for (let j = i + 1; j < nodeEntries.length; j++) {
          const [name1, coord1] = nodeEntries[i];
          const [name2, coord2] = nodeEntries[j];
          
          const distance = getDistance(coord1, coord2);
          if (distance < 300 && !doesPathCrossWall(coord1, coord2, walls)) {
            graph[name1][name2] = distance;
            graph[name2][name1] = distance;
          }
        }
      }

      return graph;
    }

    const navigationGraph = buildNavigationGraph();

    // Dijkstra's algorithm
    function dijkstra(graph, start, goal) {
      const distances = {};
      const previous = {};
      const unvisited = new Set();

      Object.keys(graph).forEach(node => {
        distances[node] = node === start ? 0 : Infinity;
        previous[node] = null;
        unvisited.add(node);
      });

      while (unvisited.size > 0) {
        let current = null;
        let minDistance = Infinity;
        
        for (const node of unvisited) {
          if (distances[node] < minDistance) {
            minDistance = distances[node];
            current = node;
          }
        }

        if (current === null || distances[current] === Infinity) return null;

        unvisited.delete(current);

        if (current === goal) {
          const path = [];
          let temp = current;
          while (temp !== null) {
            path.unshift(temp);
            temp = previous[temp];
          }
          return { path, distance: distances[goal] };
        }

        if (graph[current]) {
          Object.entries(graph[current]).forEach(([neighbor, weight]) => {
            if (unvisited.has(neighbor)) {
              const newDistance = distances[current] + weight;
              if (newDistance < distances[neighbor]) {
                distances[neighbor] = newDistance;
                previous[neighbor] = current;
              }
            }
          });
        }
      }

      return null;
    }

        statusDiv.style.color = '#065f46';
        statusDiv.style.borderLeftColor = '#10b981';
        setTimeout(() => statusDiv.style.display = 'none', 3000);
      }
    }

    function hideConnectionStatus() {
      document.getElementById('connectionStatus').style.display = 'none';
    }

      try {
        const response = await fetch(`${BACKEND_URL}/api/user-position`, {
          method: 'GET',
          headers: { 'Content-Type': 'application/json' }
        });
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const position = await response.json();
        
        if (!Array.isArray(position) || position.length !== 2 || 
            typeof position[0] !== 'number' || typeof position[1] !== 'number') {
          throw new Error('Invalid position format');
        }
        
        state.connectionError = false;
        hideConnectionStatus();
        
        return position;

        console.error('❌ Error fetching position:', error);

          state.connectionError = true;
        }
        
        return state.userLocation || [500, 500];
      }
    }

    // Update user marker - SIMPLIFIED AND FIXED
    function updateUserMarker(newLocation, isDefault = false) {
      const oldLocation = state.userLocation;
      
      // Calculate distance change
      const distanceChange = oldLocation ? getDistance(oldLocation, newLocation) : Infinity;
      
      // ONLY skip if tracking is active AND movement is too small
      if (state.isTracking && oldLocation && distanceChange < POSITION_CHANGE_THRESHOLD) {
        console.log(`⏸️ Skipping update - movement too small: ${distanceChange.toFixed(2)} units`);
        return;
      }
      
      console.log(`✅ Updating marker - movement: ${distanceChange.toFixed(2)} units, tracking: ${state.isTracking}`);
      state.userLocation = newLocation;
      
      if (userMarker) {
        // Update existing marker instantly
        userMarker.setLatLng(newLocation);
        
        if (userMarker.pulseCircle) {
          userMarker.pulseCircle.setLatLng(newLocation);
        }
        
        userMarker.setStyle({
          color: isDefault ? 'orange' : '#43e97b',
          fillColor: isDefault ? '#ff9800' : '#43e97b',
          fillOpacity: 0.9,
          radius: 12,
          weight: 3
        });
      } else {
        // Create new marker
        userMarker = L.circleMarker(newLocation, {
          color: isDefault ? 'orange' : '#43e97b',
          fillColor: isDefault ? '#ff9800' : '#43e97b',
          fillOpacity: 0.9,
          radius: 12,
          weight: 3,
          className: 'user-position-marker'
        }).addTo(map);
        
        // Static pulse circle
        const pulseCircle = L.circle(newLocation, {
          color: isDefault ? '#ff9800' : '#43e97b',
          fillColor: isDefault ? '#ff9800' : '#43e97b',
          fillOpacity: 0.1,
          radius: 30,
          weight: 1
        }).addTo(map);
        
        userMarker.pulseCircle = pulseCircle;
      }
      
      userMarker.bindPopup(
        isDefault ? 
        '<b>🟠 Default Location</b><br>(Beacons not detected)' : 
        '<b>🟢 Live Location</b><br>(BLE Active)'
      );
    }

    // Fetch and update user location
    async function fetchUserLocation() {
      const statusElement = document.getElementById('currentLocation');
      const findPathBtn = document.getElementById('findPathBtn');
      
      if (state.isFirstLoad) {
        statusElement.textContent = 'Fetching location from server...';
      }
      
      const userPosition = await fetchUserLocationFromAPI();
      const isDefault = (userPosition[0] === 500 && userPosition[1] === 500);
      
      // ALWAYS update marker when fetching location
      updateUserMarker(userPosition, isDefault);
      
      statusElement.textContent = isDefault ? 
        `🟠 Default: [${userPosition[0]}, ${userPosition[1]}] (Beacons offline)` :
        `🟢 Live: [${userPosition[0].toFixed(1)}, ${userPosition[1].toFixed(1)}] (BLE Active)`;
      
      statusElement.style.color = isDefault ? '#c05621' : '#38a169';
      
      if (state.navigationActive && state.currentPath) {
        updateNavigationProgress();
      }
      
      findPathBtn.disabled = false;
      state.lastUpdateTime = Date.now();
      
      if (state.isFirstLoad) {
        map.setView(userPosition, map.getZoom());
        state.isFirstLoad = false;
      }
    }

    // Start location polling - FIXED
    function startLocationPolling() {
      if (state.pollingInterval) {
        console.log('⚠️ Polling already active');
        return;
      }
      
      // Set tracking flag to TRUE
      state.isTracking = true;
      
      const interval = state.navigationActive ? FAST_POLLING_INTERVAL : NORMAL_POLLING_INTERVAL;
      
      // Fetch immediately
      fetchUserLocation();
      
      // Start polling
      state.pollingInterval = setInterval(fetchUserLocation, interval);
      
      const badge = document.getElementById('trackingBadge');
      badge.textContent = state.navigationActive ? 'Tracking: FAST' : 'Tracking: ON';
      badge.className = 'tracking-badge tracking-active';
      
      console.log(`📍 Polling started (${interval}ms interval) - TRACKING ACTIVE`);
    }

    // Stop location polling - FIXED
    function stopLocationPolling() {
      if (state.pollingInterval) {
        clearInterval(state.pollingInterval);
        state.pollingInterval = null;
        
        // Set tracking flag to FALSE
        state.isTracking = false;
        
        const badge = document.getElementById('trackingBadge');
        badge.textContent = 'Tracking: OFF';
        badge.className = 'tracking-badge tracking-inactive';
        
        console.log('⏸️ Polling stopped - TRACKING INACTIVE');
      }
    }

    // Switch to fast polling
    function switchToFastPolling() {
      if (state.pollingInterval) {
        stopLocationPolling();
        startLocationPolling();
      }
    }

    // Initialize map
    map = L.map('map', {
      crs: L.CRS.Simple,
      minZoom: -2,
      maxZoom: 2,
      zoomAnimation: false,
      fadeAnimation: false,
      markerZoomAnimation: false
    });

    const bounds = [[0, 0], [1000, 1000]];
    
    const img = new Image();
    img.onload = function() {
      L.imageOverlay('floorplan.jpeg', bounds).addTo(map);
      map.fitBounds(bounds);
    };
    
    img.onerror = function() {
      const canvas = document.createElement('canvas');
      canvas.width = 1000;
      canvas.height = 1000;
      const ctx = canvas.getContext('2d');
      
      const gradient = ctx.createLinearGradient(0, 0, 1000, 1000);
      gradient.addColorStop(0, '#f7fafc');
      gradient.addColorStop(1, '#edf2f7');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 1000, 1000);
      
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 1000; i += 50) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, 1000);
        ctx.moveTo(0, i);
        ctx.lineTo(1000, i);
        ctx.stroke();
      }
      
      L.imageOverlay(canvas.toDataURL(), bounds).addTo(map);
      map.fitBounds(bounds);
    };
    
    img.src = 'floorplan.jpeg';

    // Add walls
    walls.forEach(wall => {
      const layer = L.polyline([wall.start, wall.end], {
        color: '#e53e3e',
        weight: 4,
        opacity: 0.7
      }).addTo(map);
      wallLayers.push(layer);
    });

    // Add room markers
    Object.entries(rooms).forEach(([name, coord]) => {
      L.marker(coord, {
        icon: L.divIcon({
          className: 'room-marker',
          html: `<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">${name}</div>`,
          iconSize: [100, 24],
          iconAnchor: [50, 12]
        })
      }).addTo(map).bindPopup(`<b>${name}</b>`);
    });

    // Add waypoint markers (hidden by default)
    Object.entries(waypoints).forEach(([name, coord]) => {
      const marker = L.circleMarker(coord, { 
        color: '#ed8936', 
        fillColor: '#ed8936',
        fillOpacity: 0.4,
        radius: 4,
        weight: 2
      }).bindPopup(`<b>${name}</b>`);
      waypointMarkers.push(marker);
    });

    // Populate dropdown
    const endSelect = document.getElementById("end");
    Object.keys(rooms).sort().forEach(room => {
      endSelect.add(new Option(room, room));
    });

    // Toggle functions
    function toggleWalls() {
      const show = document.getElementById('showWalls').checked;
      wallLayers.forEach(layer => {
        if (show) map.addLayer(layer);
        else map.removeLayer(layer);
      });
    }

    function toggleWaypoints() {
      const show = document.getElementById('showWaypoints').checked;
      waypointMarkers.forEach(marker => {
        if (show) map.addLayer(marker);
        else map.removeLayer(marker);
      });
    }

    // Clear path
    function clearPath() {
      if (pathLine) {
        map.removeLayer(pathLine);
        pathLine = null;
      }
      
      pathMarkers.forEach(marker => map.removeLayer(marker));
      pathMarkers = [];
      
      stopNavigation();
      document.getElementById('pathInfo').style.display = 'none';
      document.getElementById('end').value = '';
    }

    // Find path
    function findPath() {
      const end = endSelect.value;
      const pathInfoDiv = document.getElementById('pathInfo');

      if (!state.userLocation) {
        alert("⚠️ User location not available!");
        return;
      }

      if (!end) {
        alert("⚠️ Please select a destination!");
        return;
      }

      clearPath();

      const tempGraph = JSON.parse(JSON.stringify(navigationGraph));
      tempGraph['USER_START'] = {};
      
      const allNodes = { ...rooms, ...waypoints };
      Object.entries(allNodes).forEach(([name, coord]) => {
        const distance = getDistance(state.userLocation, coord);
        if (distance < 300 && !doesPathCrossWall(state.userLocation, coord, walls)) {
          tempGraph['USER_START'][name] = distance;
          if (!tempGraph[name]) tempGraph[name] = {};
          tempGraph[name]['USER_START'] = distance;
        }
      });

      const result = dijkstra(tempGraph, 'USER_START', end);
      
      if (!result) {
        alert("❌ No valid path found!");
        return;
      }

      const { path, distance } = result;

      const pathCoords = path.map(nodeName => {
        if (nodeName === 'USER_START') return state.userLocation;
        return rooms[nodeName] || waypoints[nodeName];
      });

      state.currentPath = {
        coordinates: pathCoords,
        nodes: path,
        destination: end,
        totalDistance: distance,
        startTime: Date.now(),
        currentStep: 0
      };
      
      state.currentStep = 0;
      startNavigation();

      const displayPath = path.map(n => 
        n === 'USER_START' ? '📍 Start' : 
        n.startsWith('Waypoint') ? '→' : `🎯 ${n}`
      ).filter((n, i, arr) => !n.includes('→') || arr.length < 10);
      
      pathInfoDiv.innerHTML = `
        <strong>🗺️ Route:</strong> ${displayPath.join(' ')} <br>
        <strong>📏 Distance:</strong> ${distance.toFixed(1)} units | 
        <strong>🎯 Via:</strong> ${path.filter(p => p.startsWith('Waypoint')).length} waypoints
      `;
      pathInfoDiv.style.display = 'block';

      pathLine = L.polyline(pathCoords, { 
        color: '#667eea', 
        weight: 6, 
        opacity: 0.8,
        dashArray: '10, 5',
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(map);

      pathCoords.forEach((coord, index) => {
        const nodeName = path[index];
        if (index === 0 || index === pathCoords.length - 1 || !nodeName.startsWith('Waypoint')) {
          const isStart = index === 0;
          const isEnd = index === pathCoords.length - 1;
          
          const marker = L.circleMarker(coord, {
            color: isStart ? '#43e97b' : (isEnd ? '#f5576c' : '#4facfe'),
            fillColor: 'white',
            fillOpacity: 1,
            radius: 10,
            weight: 3
          }).addTo(map);
          
          marker.bindPopup(`
            <b>${nodeName === 'USER_START' ? '🚀 Start' : (isEnd ? '🎯 ' : '📍 ') + nodeName}</b><br>
            Step ${index + 1} of ${pathCoords.length}
          `);
          
          pathMarkers.push(marker);
        }
      });

      map.fitBounds(pathLine.getBounds(), { padding: [50, 50] });
    }

    // Start navigation
    function startNavigation() {
      state.navigationActive = true;
      document.getElementById('navigationInfo').style.display = 'block';
      
      if (state.pollingInterval) {
        stopLocationPolling();
      }
      startLocationPolling();
      
      console.log('🚗 Navigation started - Fast tracking enabled');
      updateNavigationStatus();
    }

    // Stop navigation
    function stopNavigation() {
      state.navigationActive = false;
      state.currentPath = null;
      state.currentStep = 0;
      
      document.getElementById('navigationInfo').style.display = 'none';
      document.getElementById('progressFill').style.width = '0%';
      
      if (state.pollingInterval) {
        stopLocationPolling();
        startLocationPolling();
      }
      
      console.log('🛑 Navigation stopped');
    }

    // Update navigation progress
    function updateNavigationProgress() {
      if (!state.currentPath || !state.userLocation) return;
      
      const pathCoords = state.currentPath.coordinates;
      let closestDistance = Infinity;
      let closestIndex = state.currentStep;
      
      for (let i = state.currentStep; i < pathCoords.length; i++) {
        const distance = getDistance(state.userLocation, pathCoords[i]);
        if (distance < closestDistance) {
          closestDistance = distance;
          closestIndex = i;
        }
      }
      
      if (closestIndex > state.currentStep && closestDistance < PROXIMITY_THRESHOLD) {
        state.currentStep = closestIndex;
        
        console.log(`✅ Waypoint ${state.currentStep + 1}/${pathCoords.length} reached`);
        
        if (state.currentStep === pathCoords.length - 1) {
          onDestinationReached();
          return;
        }
      }
      
      updateNavigationStatus();
    }

    // Update navigation status display
    function updateNavigationStatus() {
      const statusElement = document.getElementById('navStatus');
      const progressElement = document.getElementById('progressFill');
      const nextStepElement = document.getElementById('nextStep');
      
      if (!statusElement || !state.currentPath) return;
      
      const progress = Math.round(((state.currentStep + 1) / state.currentPath.coordinates.length) * 100);
      const remainingSteps = state.currentPath.coordinates.length - state.currentStep - 1;
      const distanceToNext = state.userLocation && state.currentStep < state.currentPath.coordinates.length - 1
        ? getDistance(state.userLocation, state.currentPath.coordinates[state.currentStep + 1])
        : 0;
      
      progressElement.style.width = `${progress}%`;
      
      if (state.currentStep < state.currentPath.nodes.length - 1) {
        const nextNode = state.currentPath.nodes[state.currentStep + 1];
        const nextName = nextNode === 'USER_START' ? 'Start' : 
                        nextNode.startsWith('Waypoint') ? 'Waypoint' : nextNode;
        nextStepElement.textContent = `${nextName} (${distanceToNext.toFixed(0)}m)`;
      } else {
        nextStepElement.textContent = 'Destination';
      }
      
      statusElement.innerHTML = `
        <strong>${progress}%</strong> Complete • ${remainingSteps} steps to <strong>${state.currentPath.destination}</strong>
      `;
    }

    // Destination reached
    function onDestinationReached() {
      const statusElement = document.getElementById('navStatus');
      const progressElement = document.getElementById('progressFill');
      
      progressElement.style.width = '100%';
      
      if (statusElement) {
        statusElement.innerHTML = `
          <strong>🎉 Destination Reached!</strong> Welcome to ${state.currentPath.destination}
        `;
      }
      
      setTimeout(() => {
        alert(`🎉 Congratulations! You have arrived at ${state.currentPath.destination}`);
        stopNavigation();
      }, 500);
    }

    // Test backend
    async function testBackendConnection() {
      try {
        showConnectionStatus('Testing server connection...', 'warning');
        
        const response = await fetch(`${BACKEND_URL}/health`, {
          method: 'GET'
        });
        
        if (response.ok) {
          showConnectionStatus('✓ Connected to backend', 'success');
          return true;
        } else {
          throw new Error('Server error');
        }
      } catch (error) {
        showConnectionStatus('⚠️ Cannot connect to server. Using default location.', 'error');
        return false;
      }
    }

    // Initialize
    window.addEventListener('load', async () => {
      console.log('🚀 Indoor Navigation System Starting...');
      console.log(`📡 Backend: ${BACKEND_URL}`);
      console.log(`⚡ Fast Polling: ${FAST_POLLING_INTERVAL}ms`);
      console.log(`🔄 Normal Polling: ${NORMAL_POLLING_INTERVAL}ms`);
      console.log(`📏 Position Change Threshold: ${POSITION_CHANGE_THRESHOLD} units`);
      
      await testBackendConnection();
      await fetchUserLocation();
      
      console.log('✅ System Ready');
      console.log('💡 Click "Start Tracking" to enable real-time location updates');
    });

    // Cleanup
    window.addEventListener('beforeunload', () => {
      stopLocationPolling();
    });

    // Handle tab visibility
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        console.log('⏸️ Tab hidden - tracking paused');
      } else {
        console.log('▶️ Tab visible');
        if (state.isTracking) {
          console.log('📍 Tracking active - fetching position');
          fetchUserLocation();
        } else {
          console.log('🔒 Tracking OFF - marker stays locked');
        }
      }
    });
  </script>
</body>
</html>
